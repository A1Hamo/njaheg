<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#030308" />
    <meta name="description" content="Najah — The ultimate AI-powered learning platform for Egyptian students. Study smarter, achieve more." />
    <meta property="og:title" content="Najah | Smart Learning Platform 🎓" />
    <meta property="og:description" content="AI-powered learning platform for Egyptian students — Planner, Notes, Focus, Chat, and more." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />
    <title>Najah | Smart Learning Platform 🎓</title>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Premium font stack: Plus Jakarta Sans + Syne + Noto Kufi Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { font-size: 15px; }
      body { background: #030308; overflow-x: hidden; }
      #root { min-height: 100vh; min-height: 100dvh; }
      /* Critical loading state */
      #root:empty::after {
        content: '';
        position: fixed; inset: 0;
        background: #030308;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

version: '3.9'
services:
  postgres:
    deploy:
      resources: { limits: { cpus: '1', memory: 512M } }

  mongo:
    deploy:
      resources: { limits: { cpus: '0.5', memory: 256M } }

  redis:
    deploy:
      resources: { limits: { cpus: '0.25', memory: 256M } }

  backend:
    deploy:
      replicas: 2
      resources: { limits: { cpus: '1', memory: 512M } }
      restart_policy: { condition: on-failure, delay: 5s, max_attempts: 3 }

  frontend:
    deploy:
      resources: { limits: { cpus: '0.25', memory: 64M } }

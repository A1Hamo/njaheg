name: 🚀 Deploy Najah Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:       ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/najah-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/najah-frontend

jobs:

  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       najah_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'backend/package-lock.json' }
      - run: npm ci
        working-directory: ./backend
      - run: npm run lint --if-present
        working-directory: ./backend
      - run: npm test --if-present
        working-directory: ./backend
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/najah_test
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-minimum-32-characters-long

  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'frontend/package-lock.json' }
      - run: npm ci
        working-directory: ./frontend
      - run: npm test --if-present -- --watchAll=false
        working-directory: ./frontend
        env: { CI: true }
      - run: npm run build
        working-directory: ./frontend
        env:
          REACT_APP_API_URL:          https://yourdomain.com/api
          REACT_APP_SOCKET_URL:       https://yourdomain.com
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

  build-images:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./devops/docker/backend/Dockerfile
          push:       true
          tags:       ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./devops/docker/frontend/Dockerfile
          push:       true
          tags:       ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=https://yourdomain.com/api
            REACT_APP_SOCKET_URL=https://yourdomain.com
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy devops to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   "devops/"
          target:   "/opt/najah/"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/najah
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            sleep 20
            docker-compose exec -T backend wget -qO- http://localhost:5000/health || exit 1
            docker image prune -f
            echo "✅ Deployed successfully!"

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":"✅ Najah deployed! Commit: ${{ github.sha }} by ${{ github.actor }}"}'
        env: { SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} }
        continue-on-error: true
